{% extends "base.html" %}
{% block content %}
{% load static %}

<div class="form-container">

    <img src="{% static 'img/logo_pl.png' %}" id="logo" alt="logo UAM" aria-hidden="true">
    
        
  <div class="form-form">
<form method="post" action="{% url 'account_reset_password_from_key' %}">
    {% comment %} <form method="post" action="/accounts/password/reset/key/1-set-password/"> {% endcomment %}
    {% csrf_token %}
    
           
  <div class="input-box">      
    <input type="password" name="password1" placeholder="New Password" autocomplete="new-password" required="" id="id_password1">

  <div class="input-box"> 
    <input type="password" name="password2" placeholder="New Password (again)" required="" id="id_password2">

</form></div></div>
</body>

{% endblock content %}
